services:
  fast-mcp-telegram:
    image: ${GHCR_IMAGE:-ghcr.io/leshchenko1979/fast-mcp-telegram}:${IMAGE_TAG:-main}
    container_name: fast-mcp-telegram
    env_file:
      - ./.env
    environment:
      - SERVER_MODE=http-auth
      - HOST=0.0.0.0
      - PORT=8000
      - DOMAIN=${DOMAIN}
    volumes:
      - telegram-sessions:/home/appuser/.config/fast-mcp-telegram
    networks:
      - traefik-public
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    mem_reservation: 64m
    command: python -m src.server
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null 2>&1 || exit 1"]
      start_period: 20s
      start_interval: 1s
      interval: 30s
      timeout: 5s
      retries: 2

  setup:
    profiles:
      - setup
    image: ${GHCR_IMAGE:-ghcr.io/leshchenko1979/fast-mcp-telegram}:${IMAGE_TAG:-main}
    env_file:
      - ./.env
    volumes:
      - telegram-sessions:/home/appuser/.config/fast-mcp-telegram
    stdin_open: true
    tty: true
    command: python -m src.cli_setup --overwrite

volumes:
  telegram-sessions:
    driver: local

networks:
  traefik-public:
    external: true