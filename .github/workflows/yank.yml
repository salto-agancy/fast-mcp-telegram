name: Yank 0.28.1
on: workflow_dispatch

jobs:
  yank:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Yank version 0.28.1 from PyPI
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error

          # 1. Get OIDC token from GitHub
          token = os.environ["ACTIONS_ID_TOKEN_REQUEST_TOKEN"]
          url = os.environ["ACTIONS_ID_TOKEN_REQUEST_URL"] + "&audience=pypi"

          req = urllib.request.Request(url, headers={"Authorization": f"Bearer {token}"})
          resp = urllib.request.urlopen(req)
          oidc_token = json.loads(resp.read())["value"]
          print("✓ Got GitHub OIDC token")

          # 2. Exchange OIDC token for PyPI API token
          data = json.dumps({"token": oidc_token}).encode()
          req = urllib.request.Request(
            "https://pypi.org/_/oidc/github/mint_token",
            data=data,
            headers={"Content-Type": "application/json"},
            method="POST"
          )
          resp = urllib.request.urlopen(req)
          pypi_token = json.loads(resp.read())["token"]
          print("✓ Got PyPI API token via OIDC")

          # 3. Yank version 0.28.1
          data = "yanked_reason=Bad release — auto-inlining local files is server-side wrong, should be client responsibility".encode()
          req = urllib.request.Request(
            "https://pypi.org/manage/project/fast-mcp-telegram/release/0.28.1/yank/",
            data=data,
            headers={
              "Authorization": f"Bearer {pypi_token}",
              "Content-Type": "application/x-www-form-urlencoded",
            },
            method="POST"
          )
          resp = urllib.request.urlopen(req)
          print(f"✓ Yanked. HTTP {resp.status}")
          PYEOF
