version: "3.9"

services:
  telemetry-collector:
    build: .
    ports:
      - "8000:8000"
    environment:
      TELEMETRY_DSN: postgres://telemetry:telemetry@postgres:5432/telemetry
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - telemetry-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: telemetry
      POSTGRES_USER: telemetry
      POSTGRES_PASSWORD: telemetry
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemetry -d telemetry"]
      interval: 3s
      timeout: 2s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - telemetry-net

volumes:
  pgdata:

networks:
  telemetry-net:
