services:
  telemetry-collector:
    build: .
    container_name: telemetry-collector
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      TELEMETRY_DSN: postgres://telemetry:telemetry@postgres:5432/telemetry
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - telemetry-net

  postgres:
    image: postgres:16-alpine
    container_name: telemetry-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: telemetry
      POSTGRES_PASSWORD: telemetry
      POSTGRES_DB: telemetry
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemetry -d telemetry"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - telemetry-net

networks:
  telemetry-net:
