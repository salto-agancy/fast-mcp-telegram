<h2>Two-Factor Authentication</h2>
{% include "fragments/inline_error.html" %}
<p class="muted">Enter your 2FA password for {{ masked_phone }}.</p>

<form hx-post="/setup/2fa" hx-target="#setup-flow" hx-swap="innerHTML">
    <input type="hidden" name="setup_id" value="{{ setup_id }}" />
    {% if hint %}<div class="muted">Hint: {{ hint }}</div>{% endif %}
    <label for="password">Password</label>
    <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="off" required />
    <button type="submit">Confirm</button>
</form>
