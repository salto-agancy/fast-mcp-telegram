<h2 id="delete-session-heading">Delete Session</h2>
{% include "fragments/inline_error.html" %}
<p class="muted">Enter your bearer token to permanently delete your session file.</p>
<p class="warning">
    <strong>Warning:</strong> This action cannot be undone. Your session file will be permanently deleted.
</p>

<form hx-post="/setup/delete" hx-target="#setup-flow" hx-swap="innerHTML">
    <label for="token">Bearer Token</label>
    <input id="token" name="token" type="password" placeholder="Your bearer token" autocomplete="off" required />

    <button type="submit">Delete Session</button>
</form>
