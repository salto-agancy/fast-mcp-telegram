<h2>Verify Code</h2>
{% include "fragments/inline_error.html" %}
<p class="muted">We sent a code to {{ masked_phone }}. Enter it below.</p>

<form hx-post="/setup/verify" hx-target="#setup-flow" hx-swap="innerHTML">
    <input type="hidden" name="setup_id" value="{{ setup_id }}" />
    <label for="code">Code</label>
    <input id="code" name="code" type="text" placeholder="12345" autocomplete="one-time-code" required />
    <button type="submit">Verify</button>
</form>
